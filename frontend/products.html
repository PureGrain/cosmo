<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Loading...</title>
  <meta name="description" content="">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="/cosmo.config.js"></script>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css">

  <script>
    document.title = 'Products — ' + COSMO.name;
    document.querySelector('meta[name="description"]').content = COSMO.name + ' — products and tools.';
  </script>
</head>
<body>

  <!-- ─── NAV ─── -->
  <nav id="mainNav"></nav>

  <!-- ─── PAGE HEADER ─── -->
  <section class="page-header">
    <div class="container">
      <h1>Products</h1>
      <p class="page-subtitle" id="productsSubtitle"></p>
    </div>
  </section>

  <!-- ─── PRODUCTS GRID ─── -->
  <section class="section">
    <div class="container">
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </section>

  <!-- ─── FOOTER ─── -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-powered" id="footerPowered"></p>
      <div class="footer-social" id="footerSocial"></div>
    </div>
  </footer>

  <script src="/js/markdown.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/chat-widget.js"></script>

  <script>
    var products = COSMO.products;
    var grid = document.getElementById('productsGrid');
    var subtitle = document.getElementById('productsSubtitle');

    if (!products || !products.length) {
      subtitle.textContent = 'Nothing here yet.';
      grid.innerHTML = '<div class="empty-state"><p>No products listed yet. Check back soon.</p></div>';
    } else {
      subtitle.textContent = 'Tools and products available for purchase or download.';

      products.forEach(function(product) {
        var card = document.createElement('div');
        card.className = 'card product-card';
        card.innerHTML = '<h3>' + product.title + '</h3>'
                       + '<p>' + product.description + '</p>';
        grid.appendChild(card);
      });
    }

    // ─── Footer
    document.getElementById('footerPowered').innerHTML = 'Powered by <a href="' + COSMO.footerPoweredBy.url + '">' + COSMO.footerPoweredBy.label + '</a> + Claude';

    var footerSocial = document.getElementById('footerSocial');
    if (COSMO.social) {
      Object.keys(COSMO.social).forEach(function(key) {
        if (COSMO.social[key]) {
          var a = document.createElement('a');
          a.href = COSMO.social[key];
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.className = 'footer-social-link';
          a.textContent = key.charAt(0).toUpperCase() + key.slice(1);
          footerSocial.appendChild(a);
        }
      });
    }
  </script>

  <script src="/js/animations.js"></script>
  <script src="/js/analytics.js"></script>
</body>
</html>
