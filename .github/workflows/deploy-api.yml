name: Deploy API

# Manual trigger only by default. To enable auto-deploy on push:
# 1. Add VPS_SSH_KEY and VPS_HOST to repo Settings → Secrets
# 2. Uncomment the push trigger below and remove workflow_dispatch

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ] || [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "::error::VPS_SSH_KEY and VPS_HOST secrets are required. See docs/DEPLOYMENT.md"
            exit 1
          fi

      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          ssh -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} '
            cd /opt/cosmo &&
            git pull &&
            cd api &&
            npm install --production &&
            systemctl restart cosmo &&
            sleep 2 &&
            systemctl is-active cosmo
          '
