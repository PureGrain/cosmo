name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          ssh -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} '
            cd /opt/cosmo &&
            git pull &&
            cd api &&
            npm install --production &&
            systemctl restart cosmo &&
            sleep 2 &&
            systemctl is-active cosmo
          '
